services:
  item-service:
    build: ./item-service
    container_name: item-service
    ports:
      - "8081:3000"
    environment:
      # Using your exact Atlas URI for the Item database
      - MONGODB_URI=mongodb+srv://ravindunethminawork:8808@cluster0.pxhqm.mongodb.net/item-service
    networks:
      - microservices-net

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8082:3000"
    environment:
      # Using your exact Atlas URI for the Order database
      - MONGODB_URI=mongodb+srv://ravindunethminawork:8808@cluster0.pxhqm.mongodb.net/order-service
    networks:
      - microservices-net

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8083:3000"
    environment:
      # Using your exact Atlas URI for the Payment database
      - MONGODB_URI=mongodb+srv://ravindunethminawork:8808@cluster0.pxhqm.mongodb.net/payment-service
    networks:
      - microservices-net

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - item-service
      - order-service
      - payment-service
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge
